<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08111f">
  <title>Budget Tracker Pro Offline</title>
  <style>
    :root { color-scheme: dark; --bg:#08111f; --surface:rgba(15,23,42,.86); --text:#f8fafc; --muted:#9fb1c7; --primary:#38bdf8; --border:rgba(148,163,184,.2); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; min-height:100dvh; display:grid; place-items:center; padding:1rem; font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--text); background:radial-gradient(circle at top left, rgba(56,189,248,.22), transparent 28rem), linear-gradient(145deg,#08111f,#0d1b2f); }
    main { width:min(100%,28rem); border:1px solid var(--border); border-radius:30px; background:var(--surface); box-shadow:0 24px 70px rgba(0,0,0,.38); padding:1.25rem; text-align:center; backdrop-filter:blur(18px); }
    img { width:5rem; height:5rem; border-radius:24px; margin-bottom:1rem; }
    h1 { margin:.2rem 0 .6rem; letter-spacing:-.04em; }
    p { color:var(--muted); line-height:1.55; }
    a { display:inline-flex; margin-top:.7rem; min-height:46px; align-items:center; justify-content:center; padding:.72rem 1rem; border-radius:999px; color:#fff; background:linear-gradient(135deg,var(--primary),#0ea5e9); text-decoration:none; font-weight:800; }
  </style>
</head>
<body>
  <main>
    <img src="icons/icon-192.png" alt="Budget Tracker Pro icon">
    <h1>You are offline</h1>
    <p>The app shell is cached, but this page could not be loaded. Reopen Budget Tracker Pro from your home screen or try again when your connection returns.</p>
    <a href="./index.html">Open app</a>
  </main>
</body>
</html>
